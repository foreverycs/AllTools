<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Markdown 编辑与实时预览 — 表格、代码块、导出 HTML" />
  <title>Markdown 编辑 — 工具集</title>
  <link rel="stylesheet" href="{{ static_url('/static/css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ static_url('/static/css/layout.css') }}" />
  <style>
    :root {
      --c: #d97706;
      --c2: #f59e0b;
      --c-soft: #fffbeb;
      --c-border: #fde68a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--ink);
      min-height: 100vh;
      background: var(--bg);
    }
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 8%, rgba(245, 158, 11, 0.2), transparent 55%),
        radial-gradient(ellipse 55% 40% at 90% 10%, rgba(99, 102, 241, 0.12), transparent 50%),
        linear-gradient(165deg, #fffbeb 0%, #eef2f7 45%, #f5f7fb 100%);
    }
    .shell { position: relative; z-index: 1; width: 100%; }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 999px; backdrop-filter: blur(10px);
      transition: color .15s, border-color .15s, background .15s;
    }
    .back:hover { color: #d97706; border-color: #fde68a; background: #fff; }
    .back svg { width: 15px; height: 15px; }
    .chip {
      font-size: 11px; font-weight: 700; color: #b45309;
      background: #fffbeb; border: 1px solid #fde68a;
      padding: 6px 11px; border-radius: 999px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 22px 18px;
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, #d97706, #f59e0b, #4f46e5);
    }
    .card-head {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 14px;
    }
    .icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: grid; place-items: center; font-size: 15px; flex-shrink: 0;
      background: linear-gradient(145deg, #fbbf24, #d97706);
      box-shadow: 0 10px 22px rgba(217, 119, 6, 0.3);
      font-weight: 800; color: #fff; letter-spacing: -0.03em;
    }
    .card-head h1 {
      font-size: 1.25rem; font-weight: 750; letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .card-head p { font-size: 13px; color: var(--muted); line-height: 1.55; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 12px; align-items: center;
    }
    .tb {
      font: inherit; font-size: 12px; font-weight: 650;
      padding: 6px 10px; border-radius: 9px; cursor: pointer;
      border: 1px solid #e2e8f0; background: #f8fafc; color: #475569;
      transition: background .12s, border-color .12s, color .12s;
    }
    .tb:hover { background: #fff; border-color: #fcd34d; color: #b45309; }
    .tb:disabled { opacity: 0.5; cursor: not-allowed; }
    .tb-sep {
      width: 1px; height: 18px; background: #e2e8f0; margin: 0 2px;
    }
    .check {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12.5px; font-weight: 600; color: #475569;
      cursor: pointer; user-select: none; margin-left: auto;
    }
    .check input { width: 14px; height: 14px; accent-color: #d97706; }
    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 420px;
    }
    @media (max-width: 860px) {
      .panes { grid-template-columns: 1fr; min-height: 0; }
      .check { margin-left: 0; width: 100%; }
    }
    .pane {
      display: flex; flex-direction: column; gap: 8px; min-width: 0; min-height: 0;
    }
    .pane-label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; font-weight: 700; color: #475569;
    }
    .pane-actions { display: flex; gap: 6px; }
    .mini {
      font: inherit; font-size: 11px; font-weight: 650;
      padding: 4px 9px; border-radius: 8px; cursor: pointer;
      border: 1px solid #e2e8f0; background: #f8fafc; color: #475569;
    }
    .mini:hover { background: #fff; border-color: #fcd34d; color: #b45309; }
    #editor {
      width: 100%; flex: 1; min-height: 380px; resize: vertical;
      font-family: var(--mono); font-size: 13px; line-height: 1.55;
      padding: 12px 14px; border-radius: 14px;
      border: 1px solid #e2e8f0; background: #fafbfc; color: var(--ink);
      tab-size: 2;
    }
    #editor:focus {
      outline: 2px solid rgba(217, 119, 6, 0.3);
      outline-offset: 1px;
    }
    .preview-frame {
      flex: 1; min-height: 380px;
      border: 1px solid #e2e8f0; border-radius: 14px;
      background: #fff; overflow: auto;
      padding: 16px 18px;
    }
    .md-body {
      font-size: 14.5px; line-height: 1.65; color: #0f172a;
      word-wrap: break-word;
    }
    .md-body > :first-child { margin-top: 0; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      line-height: 1.25; margin: 1.25em 0 0.5em; font-weight: 750;
    }
    .md-body h1 {
      font-size: 1.55rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.3em;
    }
    .md-body h2 {
      font-size: 1.25rem;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 0.25em;
    }
    .md-body h3 { font-size: 1.1rem; }
    .md-body p, .md-body ul, .md-body ol, .md-body blockquote,
    .md-body table, .md-body pre { margin: 0.7em 0; }
    .md-body a { color: #4f46e5; }
    .md-body code {
      font-family: var(--mono); font-size: 0.9em;
      background: #f1f5f9; padding: 0.12em 0.35em; border-radius: 4px;
    }
    .md-body pre {
      background: #0f172a; color: #e2e8f0;
      padding: 12px 14px; border-radius: 10px; overflow: auto;
    }
    .md-body pre code { background: transparent; padding: 0; color: inherit; }
    .md-body blockquote {
      margin-left: 0; padding: 0.2em 0 0.2em 0.9em;
      border-left: 4px solid #fde68a; color: #475569;
    }
    .md-body table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
    .md-body th, .md-body td {
      border: 1px solid #e2e8f0; padding: 0.4em 0.65em; text-align: left;
    }
    .md-body th { background: #f8fafc; }
    .md-body img { max-width: 100%; height: auto; }
    .md-body hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1.25em 0; }
    .md-body li { margin: 0.2em 0; }
    .md-empty {
      color: var(--muted-2); font-size: 13px; font-weight: 500;
      padding: 24px 8px; text-align: center;
    }
    .meta {
      margin-top: 12px; font-size: 12px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 8px 14px; min-height: 18px;
    }
    .meta strong { color: var(--ink-2); font-weight: 700; }
    .status {
      margin-top: 10px; font-size: 13px; line-height: 1.5;
      padding: 10px 12px; border-radius: 12px; display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .status.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .status.info { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .tips {
      margin-top: 12px; font-size: 12px; color: var(--muted-2); line-height: 1.55;
    }
  </style>
  <script>window.__ROOT__ = {{ root_path()|tojson }};</script>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tool-shell">
  <div class="shell">
    <div class="nav">
      <a class="back" href="{{ url_path('/c/coding') }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M11 18l-6-6 6-6"/>
        </svg>
        编码工具
      </a>
      <span class="chip">Edit · Preview</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="icon" aria-hidden="true">MD</div>
        <div>
          <h1>Markdown 编辑</h1>
          <p>左侧书写，右侧实时预览。支持标题、列表、表格、代码块与链接；服务端渲染并过滤危险 HTML。</p>
        </div>
      </div>

      <div class="toolbar">
        <button type="button" class="tb" data-wrap="**|**" title="粗体">B</button>
        <button type="button" class="tb" data-wrap="*|*" title="斜体"><em>I</em></button>
        <button type="button" class="tb" data-wrap="`|`" title="行内代码">&lt;/&gt;</button>
        <button type="button" class="tb" data-prefix="# " title="标题">H1</button>
        <button type="button" class="tb" data-prefix="- " title="列表">• 列表</button>
        <button type="button" class="tb" data-prefix="> " title="引用">引用</button>
        <button type="button" class="tb" data-insert="TABLE" title="表格">表格</button>
        <button type="button" class="tb" data-insert="CODE" title="代码块">代码块</button>
        <span class="tb-sep" aria-hidden="true"></span>
        <button type="button" class="tb" id="btnSample">示例</button>
        <button type="button" class="tb" id="btnCopyMd">复制 MD</button>
        <button type="button" class="tb" id="btnCopyHtml">复制 HTML</button>
        <button type="button" class="tb" id="btnExport">导出 HTML</button>
        <button type="button" class="tb" id="btnClear">清空</button>
        <label class="check">
          <input type="checkbox" id="livePreview" checked />
          实时预览
        </label>
      </div>

      <div class="panes">
        <div class="pane">
          <div class="pane-label">
            <span>Markdown 源码</span>
            <div class="pane-actions">
              <button type="button" class="mini" id="btnRender">立即渲染</button>
            </div>
          </div>
          <textarea id="editor" spellcheck="false" placeholder="在此输入 Markdown…"></textarea>
        </div>
        <div class="pane">
          <div class="pane-label">
            <span>预览</span>
            <span style="font-weight:500;color:var(--muted-2);font-size:11px" id="renderState">就绪</span>
          </div>
          <div class="preview-frame" id="preview">
            <div class="md-empty">开始输入后将在此预览…</div>
          </div>
        </div>
      </div>

      <div class="meta" id="meta"></div>
      <div class="status" id="status"></div>
      <p class="tips">
        提示：Tab 插入两个空格；Ctrl/Cmd + Enter 立即渲染。
        默认 XSS 过滤开启。最大约 {{ (max_chars // 1024) if max_chars else 512 }}K 字符。
      </p>
    </div>
  </div>
  </div>

  <script>
    const SAMPLE = {{ sample|tojson }};
    const SNIPPETS = {
      TABLE: "\n| a | b |\n|---|---|\n| 1 | 2 |\n",
      CODE: "\n```\ncode\n```\n"
    };
    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const livePreview = document.getElementById("livePreview");
    const meta = document.getElementById("meta");
    const status = document.getElementById("status");
    const renderState = document.getElementById("renderState");
    const root = window.__ROOT__ || "";

    let lastHtml = "";
    let timer = null;
    let rendering = false;
    let pending = false;

    function setStatus(kind, text) {
      if (!text) {
        status.className = "status";
        status.textContent = "";
        return;
      }
      status.className = "status show " + kind;
      status.textContent = text;
    }

    function showMeta(data) {
      const parts = [];
      if (data.chars != null) parts.push("字符 <strong>" + data.chars + "</strong>");
      if (data.words != null) parts.push("词/字 <strong>" + data.words + "</strong>");
      if (data.lines != null) parts.push("行 <strong>" + data.lines + "</strong>");
      if (data.sanitized) parts.push("XSS 过滤 <strong>开</strong>");
      meta.innerHTML = parts.join(" · ");
    }

    function detailMessage(data) {
      const d = data && data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) return d.map(function (x) { return x.msg || x.message || x; }).join("; ");
      return (data && data.message) || "请求失败";
    }

    async function renderNow() {
      if (rendering) {
        pending = true;
        return;
      }
      rendering = true;
      pending = false;
      renderState.textContent = "渲染中…";
      try {
        const fd = new FormData();
        fd.append("text", editor.value);
        fd.append("sanitize", "true");
        const res = await fetch(root + "/tools/markdown/render", { method: "POST", body: fd });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) throw new Error(detailMessage(data));
        lastHtml = data.html || "";
        if (!lastHtml) {
          preview.innerHTML = '<div class="md-empty">开始输入后将在此预览…</div>';
        } else {
          preview.innerHTML = '<div class="md-body"></div>';
          preview.firstChild.innerHTML = lastHtml;
        }
        showMeta(data);
        renderState.textContent = "已更新";
        setStatus("");
      } catch (err) {
        renderState.textContent = "失败";
        setStatus("err", err.message || String(err));
      } finally {
        rendering = false;
        if (pending) renderNow();
      }
    }

    function scheduleRender() {
      if (!livePreview.checked) return;
      if (timer) clearTimeout(timer);
      timer = setTimeout(renderNow, 280);
    }

    function insertAround(before, after) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const val = editor.value;
      const selected = val.slice(start, end) || "text";
      const next = val.slice(0, start) + before + selected + after + val.slice(end);
      editor.value = next;
      const s = start + before.length;
      editor.setSelectionRange(s, s + selected.length);
      editor.focus();
      scheduleRender();
      persist();
    }

    function insertPrefix(prefix) {
      const start = editor.selectionStart;
      const val = editor.value;
      const lineStart = val.lastIndexOf("\n", start - 1) + 1;
      editor.value = val.slice(0, lineStart) + prefix + val.slice(lineStart);
      editor.setSelectionRange(start + prefix.length, start + prefix.length);
      editor.focus();
      scheduleRender();
      persist();
    }

    function insertText(text) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const val = editor.value;
      editor.value = val.slice(0, start) + text + val.slice(end);
      const pos = start + text.length;
      editor.setSelectionRange(pos, pos);
      editor.focus();
      scheduleRender();
      persist();
    }

    function persist() {
      try { localStorage.setItem("md_editor_v1", editor.value); } catch (e) {}
    }

    document.querySelectorAll(".tb[data-wrap]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const parts = btn.getAttribute("data-wrap").split("|");
        insertAround(parts[0], parts[1] || parts[0]);
      });
    });
    document.querySelectorAll(".tb[data-prefix]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        insertPrefix(btn.getAttribute("data-prefix"));
      });
    });
    document.querySelectorAll(".tb[data-insert]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const key = btn.getAttribute("data-insert");
        insertText(SNIPPETS[key] || key);
      });
    });

    document.getElementById("btnSample").addEventListener("click", function () {
      editor.value = SAMPLE || "";
      persist();
      scheduleRender();
    });
    document.getElementById("btnClear").addEventListener("click", function () {
      editor.value = "";
      lastHtml = "";
      preview.innerHTML = '<div class="md-empty">开始输入后将在此预览…</div>';
      meta.innerHTML = "";
      setStatus("");
      renderState.textContent = "就绪";
      persist();
    });
    document.getElementById("btnRender").addEventListener("click", renderNow);
    livePreview.addEventListener("change", function () {
      if (livePreview.checked) scheduleRender();
    });

    document.getElementById("btnCopyMd").addEventListener("click", async function () {
      try {
        await navigator.clipboard.writeText(editor.value);
        setStatus("ok", "已复制 Markdown");
      } catch (e) {
        editor.select();
        document.execCommand("copy");
        setStatus("ok", "已复制 Markdown");
      }
    });

    document.getElementById("btnCopyHtml").addEventListener("click", async function () {
      if (!lastHtml) await renderNow();
      if (!lastHtml) {
        setStatus("info", "暂无 HTML 可复制");
        return;
      }
      try {
        await navigator.clipboard.writeText(lastHtml);
        setStatus("ok", "已复制 HTML 片段");
      } catch (e) {
        setStatus("err", "复制失败");
      }
    });

    document.getElementById("btnExport").addEventListener("click", async function () {
      try {
        const fd = new FormData();
        fd.append("text", editor.value);
        fd.append("sanitize", "true");
        fd.append("title", "Markdown");
        const res = await fetch(root + "/tools/markdown/export-html", { method: "POST", body: fd });
        if (!res.ok) {
          const data = await res.json().catch(function () { return {}; });
          throw new Error(detailMessage(data));
        }
        const blob = await res.blob();
        const a = document.createElement("a");
        const href = URL.createObjectURL(blob);
        a.href = href;
        a.download = "markdown-export.html";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(href);
        setStatus("ok", "已导出 HTML");
      } catch (err) {
        setStatus("err", err.message || String(err));
      }
    });

    editor.addEventListener("input", function () {
      persist();
      scheduleRender();
    });
    editor.addEventListener("keydown", function (e) {
      if (e.key === "Tab") {
        e.preventDefault();
        insertText("  ");
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        renderNow();
      }
    });

    try {
      const saved = localStorage.getItem("md_editor_v1");
      if (saved != null && saved !== "") {
        editor.value = saved;
      } else {
        editor.value = SAMPLE || "";
      }
    } catch (e) {
      editor.value = SAMPLE || "";
    }
    renderNow();
  </script>
</body>
</html>
