services:
  toolbox:
    build: .
    image: pdf2word-toolbox:latest
    ports:
      - "8002:8000"
    environment:
      # Explicit path so word2pdf always finds LibreOffice in the container.
      LIBREOFFICE_PATH: /usr/bin/soffice
      HOME: /tmp
      SAL_USE_VCLPLUGIN: svp
    # LibreOffice headless needs a bit of RAM for complex docs.
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
