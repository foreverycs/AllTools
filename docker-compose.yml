services:
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # China-friendly pull of library/python (avoids docker.io timeout).
        # Alternatives if this mirror fails:
        #   docker.1ms.run/library/python:3.12-slim
        #   dockerproxy.com/library/python:3.12-slim
        #   python:3.12-slim   # only if the host has a working registry-mirror
        PYTHON_IMAGE: docker.m.daocloud.io/library/python:3.12-slim
    image: pdf2word-toolbox:latest
    ports:
      - "8002:8000"
    # Secrets and admin flags live in project-root .env (required for production).
    # Weak defaults are intentionally NOT injected here — set ADMIN_PASSWORD /
    # ADMIN_SECRET (and ALLOW_INSECURE_ADMIN=1 only for local/dev) in .env.
    env_file:
      - .env
    environment:
      LIBREOFFICE_PATH: /usr/bin/soffice
      HOME: /tmp
      SAL_USE_VCLPLUGIN: svp
      UPLOAD_RETENTION_DAYS: "5"
      UPLOAD_FILE_DIR: /app/file
      CONVERT_CONCURRENCY: "2"
      # Prefer keys from env_file (.env) over any process shell leftovers:
      DOTENV_OVERRIDE: "1"
      # In-process job store (async convert). Do not scale replicas without Redis jobs.
      JOBS_BACKEND: memory
    volumes:
      # Persist upload history on the host
      - ./file:/app/file
      # Optional: mount host .env so edits apply after container restart
      - ./.env:/app/.env:ro
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
