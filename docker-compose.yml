services:
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # China-friendly pull of library/python (avoids docker.io timeout).
        # Alternatives if this mirror fails:
        #   docker.1ms.run/library/python:3.12-slim
        #   dockerproxy.com/library/python:3.12-slim
        #   python:3.12-slim   # only if the host has a working registry-mirror
        PYTHON_IMAGE: docker.m.daocloud.io/library/python:3.12-slim
    image: pdf2word-toolbox:latest
    ports:
      - "8002:8000"
    environment:
      LIBREOFFICE_PATH: /usr/bin/soffice
      HOME: /tmp
      SAL_USE_VCLPLUGIN: svp
      UPLOAD_RETENTION_DAYS: "5"
      UPLOAD_FILE_DIR: /app/file
      CONVERT_CONCURRENCY: "2"
      # Dev-only: weak admin allowed. Production MUST set ALLOW_INSECURE_ADMIN=0
      # (or omit it) and provide strong ADMIN_PASSWORD + ADMIN_SECRET.
      ALLOW_INSECURE_ADMIN: "1"
      ADMIN_PASSWORD: admin123
      ADMIN_SECRET: dev-only-change-me-use-long-random
    volumes:
      # Persist upload history on the host
      - ./file:/app/file
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
