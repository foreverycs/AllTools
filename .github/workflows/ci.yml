name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          ALLOW_INSECURE_ADMIN: "1"
          # Skip real MS Word / LibreOffice e2e when engines are absent;
          # mocked paths still run.
        run: |
          pytest tests/ -q --tb=short \
            -k "not real_convert_if_engine_present"
